# Cf config exercising the explicit `groupings` chain (issue #128, step 5).
#
# This fixture demonstrates the new opt-in YAML form for BodyConfig:
# instead of `sub_bodies: ZoningModel`, the user provides an explicit
# `groupings: list[GroupingSpec]` that is applied verbatim to the parent
# mesh. The chain below combines all three built-in kinds:
#
#   1. by_surface  -- collect the lanternim sub-surfaces into one group.
#   2. by_zoning   -- bin the lanternim group into z-slabs.
#   3. by_connectivity -- additionally tag the connected components of
#      lanternim (a stress-test that the new chain accepts compositions
#      the legacy sub_bodies field could not express).
bodies:
  lanternim:
    surfaces: ["L1_xp", "L2_yp", "L3_zp_yp", "L4_zp_ym", "L5_ym", "L6_xm"]
force_coefficient:
  measurement_explicit_chain:
    bodies:
      - name: lanternim
        groupings:
          - kind: by_surface
            sets:
              lanternim: ["L1_xp", "L2_yp", "L3_zp_yp", "L4_zp_ym", "L5_ym", "L6_xm"]
          - kind: by_zoning
            restrict_to: ["lanternim"]
            z_intervals: [0, 10, 20]
            name_template: "{idx}-lanternim"
          - kind: by_connectivity
            restrict_to: ["lanternim"]
            name_template: "cc{idx}-lanternim"
            min_triangles: 1
    nominal_area: 10
    directions: ["x", "y", "z"]
    statistics:
      - stats: "mean"
      - stats: "rms"
    transformation:
      rotation: [0, 0, 0]
